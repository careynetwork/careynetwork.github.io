<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Apps - The Carey Network</title>

<link rel="stylesheet" href="../css/style.css" />

<link rel="apple-touch-icon" href="/images/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Carey Network">
<link rel="icon" href="/images/icon.png">
<link rel="manifest" href="/manifest.json">
</head>

<body class="games-page">

<header class="site-header">

</header>

<main>
  <section class="hero orange-bg">

    <div class="games-overlay">
      <p class="games-section-label">Apps</p>

      <div class="games-grid">

        <!-- ROW 1 -->
        <a href="/apps/youtube" class="game-card"><img src="/images/apps/youtube.png" alt="YouTube"></a>
        <a href="/apps/discord" class="game-card"><img src="/images/apps/discord.png" alt="Discord"></a>
        <a href="/apps/gemini" class="game-card"><img src="/images/apps/gemini.png" alt="Gemini"></a>
        <a href="/apps/twitch" class="game-card"><img src="/images/apps/twitch.png" alt="Twitch"></a>
        <a href="/apps/snapchat" class="game-card"><img src="/images/apps/snapchat.png" alt="Snapchat"></a>

      </div>
    </div>

  </section>
</main>

<div id="nav-container"></div>

<footer class="site-footer">
  <p>&copy; 2026 The Carey Network</p>
</footer>

<script src="/js/main.js"></script>

</html>
