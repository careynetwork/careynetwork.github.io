<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Carey Network Admin</title>

<link rel="icon" href="/images/icon.png">

<style>
:root{
  --orange:#e65c00;
  --bg:#111;
  --card:#1b1b1b;
  --border:#2b2b2b;
  --text:#fff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter,sans-serif;
}

.hero{
  background:linear-gradient(135deg,#ff7a00,#e65c00);
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:3rem;
}

.dashboard{
  max-width:1400px;
  margin:auto;
  padding:25px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:25px;
}

.card h3{
  margin-bottom:10px;
}

.big{
  font-size:2.5rem;
  color:var(--orange);
  font-weight:800;
}

.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.console{
  height:500px;
  overflow:auto;
  background:#0b0b0b;
  border-radius:12px;
  padding:15px;
  font-family:monospace;
}

.console div{
  margin-bottom:8px;
}

.pages-list div{
  padding:10px;
  border-bottom:1px solid #333;
}
</style>
</head>
<body>

<section class="hero">
  <h1>Carey Network Console</h1>
  <p>Realtime Monitoring Dashboard</p>
</section>

<div class="dashboard">

  <div class="stats">

    <div class="card">
      <h3>Online Users</h3>
      <div id="onlineUsers" class="big">0</div>
    </div>

    <div class="card">
      <h3>Tracked Pages</h3>
      <div id="trackedPages" class="big">0</div>
    </div>

  </div>

  <div class="grid">

    <div class="card">
      <h3>Live Activity</h3>
      <div id="activityFeed" class="console"></div>
    </div>

    <div class="card">
      <h3>Pages Being Viewed</h3>
      <div id="pagesList" class="pages-list"></div>
    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0t3RK22ghr2O6WTtz6uFoyP6xUF8iw3A",
  authDomain: "carey-network-info.firebaseapp.com",
  databaseURL: "https://carey-network-info-default-rtdb.firebaseio.com",
  projectId: "carey-network-info",
  storageBucket: "carey-network-info.firebasestorage.app",
  messagingSenderId: "1000390544880",
  appId: "1:1000390544880:web:6c5f85436352b094272135",
  measurementId: "G-C1C9SJ091R"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const onlineUsers =
  document.getElementById("onlineUsers");

const trackedPages =
  document.getElementById("trackedPages");

const pagesList =
  document.getElementById("pagesList");

const activityFeed =
  document.getElementById("activityFeed");

onValue(ref(db,"onlineUsers"), snapshot => {

  const users =
    snapshot.val() || {};

  const sessions =
    Object.values(users);

  onlineUsers.textContent =
    sessions.length;

  const pages = {};

  sessions.forEach(user => {

    pages[user.page] =
      (pages[user.page] || 0) + 1;

  });

  trackedPages.textContent =
    Object.keys(pages).length;

  pagesList.innerHTML = "";

  Object.entries(pages)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([page,count]) => {

      const row =
        document.createElement("div");

      row.textContent =
        `${page} (${count})`;

      pagesList.appendChild(row);

    });

});

onValue(ref(db,"activity"), snapshot => {

  const data =
    snapshot.val() || {};

  const entries =
    Object.values(data)
      .sort((a,b)=>
        (b.timestamp||0) -
        (a.timestamp||0)
      )
      .slice(0,100);

  activityFeed.innerHTML = "";

  entries.forEach(entry => {

    const line =
      document.createElement("div");

    const date =
      new Date(
        entry.timestamp || Date.now()
      ).toLocaleTimeString();

    line.textContent =
      `[${date}] ${entry.type.toUpperCase()} ${entry.page}`;

    activityFeed.appendChild(line);

  });

});

</script>

</body>
</html>
